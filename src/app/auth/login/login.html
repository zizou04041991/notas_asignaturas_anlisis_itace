<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 p-4"
>
  <div class="w-full max-w-md">
    <div class="relative">
      <div
        class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-24 h-1.5 bg-gradient-to-r from-[#B3294B] to-[#8A1F3A] rounded-full"
      ></div>

      <div class="bg-white rounded-2xl shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
          <div class="relative inline-block">
            <div
              class="absolute inset-0 bg-gradient-to-r from-[#B3294B] to-[#8A1F3A] rounded-full blur-lg opacity-20"
            ></div>
            <div
              class="relative w-20 h-20 mx-auto bg-gradient-to-br from-[#B3294B] to-[#8A1F3A] rounded-2xl rotate-45 flex items-center justify-center shadow-lg"
            >
              <fa-icon [icon]="faGraduationCap" class="text-white text-3xl -rotate-45"></fa-icon>
            </div>
          </div>
          <h2 class="text-2xl font-bold text-gray-800 mt-4">Bienvenido</h2>
          <p class="text-gray-500 text-sm mt-1">Inicia sesión en tu cuenta</p>
        </div>

        <form class="space-y-6" [formGroup]="formLogin">
          <!-- Campo Número de Control -->
          <div class="space-y-2">
            <label for="username" class="block text-sm font-medium text-gray-700">
              {{ !isStudent ? 'Usuario' : 'Número de Control' }}
            </label>
            <div class="relative">
              <input
                id="username"
                name="username"
                formControlName="username"
                type="text"
                pInputText
                class="w-full pl-3 p-3 border-2 border-gray-200 rounded-xl transition-all duration-200"
                placeholder="{{
                  !isStudent ? 'Ingrese su usuario' : 'Ingresa tu número de control'
                }}"
              />
            </div>
          </div>

          <!-- Campo Contraseña -->
          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium text-gray-700">
              Contraseña
            </label>
            <div class="relative">
              <p-password
                id="password"
                name="password"
                [toggleMask]="true"
                formControlName="password"
                [feedback]="false"
                inputStyleClass="w-full pl-3 p-3 border-2 border-gray-200 rounded-xl transition-all duration-200"
                styleClass="w-full"
                placeholder="Ingresa tu contraseña"
                [inputStyle]="{ width: '100%' }"
              ></p-password>
            </div>
          </div>

          <!-- Botón de inicio de sesión -->
          <button
            type="button"
            (click)="accessLogin()"
            [disabled]="formLogin.invalid"
            class="w-full py-3 px-4 bg-gradient-to-r from-[#B3294B] to-[#8A1F3A] text-white font-medium rounded-xl shadow-lg shadow-[#B3294B]/30 hover:shadow-xl hover:shadow-[#B3294B]/40 transform hover:-translate-y-0.5 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-lg flex items-center justify-center gap-2"
          >
            @if (loading) {
              <i class="pi pi-spin pi-spinner"></i>
            }
            <span>{{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}</span>
          </button>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-2 bg-white text-gray-400">Sistema Académico ITACE</span>
            </div>
          </div>
        </form>
      </div>
    </div>
    <p class="text-center text-gray-400 text-xs mt-6">
      © {{ year }} ITACE - Todos los derechos reservados
    </p>
  </div>
</div>
