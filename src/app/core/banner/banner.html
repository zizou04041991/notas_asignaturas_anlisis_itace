 <header class="bg-white shadow-sm flex-shrink-0">
        <div class="px-4 md:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button (click)="toggleMenu.emit()" class="text-gray-600 hover:text-gray-800 cursor-pointer md:hidden">
                    <fa-icon [icon]="faBars" class="text-2xl"></fa-icon>
                </button>
                <h2 class="text-xl md:text-2xl font-semibold text-gray-800">{{ titulo }}</h2>
            </div>

            <div class="flex items-center gap-3 md:gap-4">
                <h2 class="text-sm font-semibold text-gray-800">{{ user.nombre }}</h2>
                <div >
                    <fa-icon [icon]="faUserCircle" class="text-2xl text-gray-600"></fa-icon>
                </div>
            </div>
   
        </div>
    </header>
