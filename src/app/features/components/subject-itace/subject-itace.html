<!-- Tcp.component.html -->
<div class="card flex justify-center gap-2">
  <p-confirmdialog />
</div>

<div class="bg-white rounded-xl shadow-md p-4 md:p-6">
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 md:mb-6"
  >
    <h2 class="text-xl font-semibold">Gestión de Materia</h2>
    <button
      class="text-sm bg-blue-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg hover:bg-blue-700 transition w-full sm:w-auto"
      (click)="addSubject()"
    >
      + Nueva Materia
    </button>
  </div>

  <app-reusable-table
    [data]="subjectItace()"
    [loading]="loading()"
    [totalRecords]="totalRecords()"
    [first]="currentPage() * pageSize()"
    [rows]="pageSize()"
    [config]="tableConfig"
    (loadData)="loadSubjects($event)"
    (onEdit)="onEditSubject($event)"
    (onDelete)="onDeleteSubject($event)"
  >
    <!-- Template personalizado para el cuerpo de la tabla -->
    <ng-template #customBody let-rowData>
      @for (col of tableConfig.columns; track col.field) {
        @if (col.field === 'color') {
          <td>
            <p-colorpicker
              [(ngModel)]="rowData.color"
              [disabled]="true"
              styleClass="inline-block"
            />
          </td>
        } @else {
          <td>{{ rowData[col.field] }}</td>
        }
      }
    </ng-template>
  </app-reusable-table>
</div>
