
<div class="card flex justify-center gap-2">
  <p-confirmdialog />
</div>
<div class="bg-white rounded-xl shadow-md p-4 md:p-6">
  <div class="flex flex-col sm:flex-row justify-end items-start sm:items-center gap-3 mb-4 md:mb-6">
    <button
      (click)="show()"
      class="text-sm bg-blue-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg hover:bg-blue-700 transition w-full sm:w-auto"
    >
      + Nueva Asignatura
    </button>
  </div>

  <div class="card">
    <p-table
      [value]="subjectiTaces"
      [paginator]="true"
      [loading]="loading"
      [rows]="5"
      [tableStyle]="{ 'min-width': '50rem' }"
      [rowsPerPageOptions]="[5, 10, 20]"
    >
      <ng-template #header>
        <tr>
          <th style="width: 25%">Nombre</th>
          <th style="width: 25%">Color</th>
          <th style="width: 25%">Acciones</th>
        </tr>
      </ng-template>
      <ng-template #body let-customer>
        <tr>
          <td>{{ customer.nombre }}</td>
          <td><p-colorpicker [(ngModel)]="customer.color" [disabled]="true" /></td>
          <td>
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              severity="info"
              class="mr-1"
              (click)="edit(customer)"
            />
            <p-button
              icon="pi pi-times"
              [rounded]="true"
              severity="danger"
              (click)="delete(customer)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
